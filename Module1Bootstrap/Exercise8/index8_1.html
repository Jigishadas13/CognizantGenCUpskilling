<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Job Registration Form</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<div class="container mt-5">
    <div class="card shadow p-4">
        <h2 class="text-center mb-4">Job Registration Form</h2>

        <form>
            <div class="mb-3">
                <label class="form-label">Full Name</label>
                <input type="text" class="form-control" placeholder="Enter your full name">
            </div>

            <div class="mb-3">
                <label class="form-label">Email Address</label>
                <input type="email" class="form-control" placeholder="Enter your email">
            </div>

            <div class="mb-3">
                <label class="form-label">Phone Number</label>
                <div class="input-group">
                    <span class="input-group-text">+91</span>
                    <input type="tel" class="form-control" placeholder="9876543210">
                </div>
            </div>

            <div class="mb-3">
                <label class="form-label">Position Applied For</label>
                <select class="form-select">
                    <option selected>Select Position</option>
                    <option>Software Developer</option>
                    <option>UI/UX Designer</option>
                    <option>Data Analyst</option>
                    <option>Cybersecurity Intern</option>
                </select>
            </div>

            <div class="mb-3">
                <label class="form-label">Skills</label>

                <div class="form-check">
                    <input class="form-check-input" type="checkbox" id="java">
                    <label class="form-check-label" for="java">
                        Java
                    </label>
                </div>

                <div class="form-check">
                    <input class="form-check-input" type="checkbox" id="python">
                    <label class="form-check-label" for="python">
                        Python
                    </label>
                </div>

                <div class="form-check">
                    <input class="form-check-input" type="checkbox" id="react">
                    <label class="form-check-label" for="react">
                        React
                    </label>
                </div>
            </div>

            <button type="submit" class="btn btn-primary w-100">
                Register
            </button>
        </form>
    </div>
</div>

</body>
</html>
