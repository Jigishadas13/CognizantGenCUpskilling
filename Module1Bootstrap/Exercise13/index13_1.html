<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<div class="container py-5">

    <h2 class="text-center mb-4">Admin Dashboard</h2>

    <div class="row g-4">

        <div class="col-md-3">
            <div class="bg-primary text-white p-4 rounded text-center">
                <h3>250</h3>
                <p>Total Users</p>
            </div>
        </div>

        <div class="col-md-3">
            <div class="bg-success text-white p-4 rounded text-center">
                <h3>120</h3>
                <p>Orders</p>
            </div>
        </div>

        <div class="col-md-3">
            <div class="bg-warning text-dark p-4 rounded text-center">
                <h3>15</h3>
                <p>Pending Tasks</p>
            </div>
        </div>

        <div class="col-md-3">
            <div class="bg-danger text-white p-4 rounded text-center">
                <h3>5</h3>
                <p>Alerts</p>
            </div>
        </div>

    </div>

</div>

</body>
</html>
