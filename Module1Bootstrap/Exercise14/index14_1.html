<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Display Utilities</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<div class="container mt-5">

    <div class="d-none bg-danger text-white p-3 mb-3">
        Hidden on all screen sizes
    </div>

    <div class="d-none d-md-block bg-success text-white p-3 mb-3">
        Visible on Medium Screens and Above
    </div>

    <div class="d-none d-lg-flex bg-primary text-white p-3 justify-content-center">
        Visible as Flex on Large Screens and Above
    </div>

</div>

</body>
</html>
