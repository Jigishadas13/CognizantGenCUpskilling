<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Responsive Sidebar</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<div class="container-fluid">
    <div class="row">

        <div class="col-md-3 bg-dark text-white p-4 d-none d-md-block vh-100">
            <h4>Dashboard</h4>
            <ul class="list-unstyled">
                <li class="mb-2">Home</li>
                <li class="mb-2">Profile</li>
                <li class="mb-2">Reports</li>
                <li class="mb-2">Settings</li>
            </ul>
        </div>

        <div class="col-md-9 p-4">
            <h2>Main Content Area</h2>
            <p>
                The sidebar is hidden on mobile devices and visible on tablets and larger screens.
            </p>
        </div>

    </div>
</div>

</body>
</html>
